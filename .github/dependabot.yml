version: 2

updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 10
    reviewers:
      - "baarli"
    assignees:
      - "baarli"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    groups:
      # Group all development dependencies together
      dev-dependencies:
        patterns:
          - "@types/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "prettier"
          - "@vitest/*"
          - "vitest"
          - "jsdom"
          - "@testing-library/*"
          - "msw"
          - "@mswjs/*"
          - "husky"
          - "lint-staged"
        update-types:
          - "minor"
          - "patch"
      
      # Group React-related dependencies
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "react-router-dom"
          - "@vitejs/plugin-react"
        update-types:
          - "minor"
          - "patch"
      
      # Group styling dependencies
      styling:
        patterns:
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "clsx"
          - "tailwind-merge"
        update-types:
          - "minor"
          - "patch"
      
      # Group testing dependencies
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
          - "msw"
          - "@mswjs/*"
        update-types:
          - "minor"
          - "patch"
    
    ignore:
      # Ignore major version updates for critical dependencies (manual review required)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
    
    labels:
      - "dependencies"
      - "automated"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5
    reviewers:
      - "baarli"
    assignees:
      - "baarli"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
      - "dependencies"
      - "automated"
