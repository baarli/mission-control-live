<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Mission Control | NRJ Morgen</title>
<style>
:root { --c1: #6366f1; --c2: #10b981; --c3: #ef4444; --bg: #0f172a; --bg2: #1e293b; --tx: #f8fafc; --muted: #94a3b8; --b: #334155; }
body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--tx); margin: 0; }
.login { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 1000; }
.box { background: var(--bg2); padding: 2rem; border-radius: 1rem; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--b); }
.icon { width: 60px; height: 60px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1rem; }
input, button { padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--b); font-size: 1rem; }
input { width: 100%; background: var(--bg); color: var(--tx); margin-bottom: 1rem; box-sizing: border-box; }
button { background: var(--c1); color: white; border: none; cursor: pointer; }
button:hover { opacity: 0.9; }
.full { width: 100%; }
.app { display: none; }
.header { background: var(--bg2); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid var(--b); }
.nav { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.nav button { background: transparent; color: var(--muted); }
.nav button.active { background: var(--c1); color: white; }
.container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.section { display: none; }
.section.active { display: block; }
.card { background: rgba(30,41,59,0.8); border: 1px solid var(--b); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat { text-align: center; padding: 1.5rem; background: rgba(30,41,59,0.5); border-radius: 0.75rem; border: 1px solid var(--b); }
.val { font-size: 2.5rem; font-weight: 700; color: var(--c1); }
.lbl { color: var(--muted); font-size: 0.875rem; margin-top: 0.5rem; }
.loading { text-align: center; padding: 3rem; color: var(--muted); }
.alert { padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; }
.ok { background: rgba(16,185,129,0.1); border: 1px solid var(--c2); color: var(--c2); }
.err { background: rgba(239,68,68,0.1); border: 1px solid var(--c3); color: var(--c3); }
.flex { display: flex; gap: 1rem; }
.between { justify-content: space-between; align-items: center; }
@media (max-width: 768px) { .header { padding: 1rem; } .container { padding: 1rem; } }
</style>
</head>
<body>
<div class="login" id="login-screen">
<div class="box">
<div class="icon">🎛️</div>
<h1>Mission Control</h1>
<p style="color: var(--muted); margin-bottom: 2rem;">NRJ Morgen Dashboard</p>
<input type="password" id="password-input" placeholder="Passord" onkeypress="if(event.key=='Enter')doLogin()">
<button class="full" onclick="doLogin()">Logg inn</button>
<p id="login-error" style="color: var(--c3); display: none; margin-top: 1rem;">Feil passord</p>
</div>
</div>

<div class="app" id="app">
<header class="header">
<div>
<div style="font-weight: 700;">Mission Control</div>
<div style="font-size: 0.75rem; color: var(--muted);">NRJ Morgen</div>
</div>
<nav class="nav">
<button class="active" onclick="showSection('dashboard')" data-section="dashboard">📊 Dashboard</button>
<button onclick="showSection('saksliste')" data-section="saksliste">📋 Saksliste</button>
<button onclick="showSection('stats')" data-section="stats">📈 Statistikk</button>
<button onclick="doLogout()">🚪 Logg ut</button>
</nav>
</header>

<main class="container">
<section class="section active" id="dashboard">
<div class="stats">
<div class="stat"><div class="val" id="dash-saker">-</div><div class="lbl">Saker</div></div>
<div class="stat"><div class="val" id="dash-radio">-</div><div class="lbl">Radio lyttere</div></div>
<div class="stat"><div class="val" id="dash-podcast">-</div><div class="lbl">Podcast rank</div></div>
</div>
<div class="card"><h2>📊 Status</h2><div id="dash-status">Laster...</div></div>
</section>

<section class="section" id="saksliste">
<div class="card">
<div class="flex between" style="margin-bottom: 1rem;">
<h2>📋 Saksliste</h2>
<div class="flex">
<input type="date" id="saksliste-date" onchange="loadSaker()" style="width: auto; margin: 0;">
<button onclick="loadSaker()">🔄</button>
</div>
</div>
<div id="saksliste-content"><div class="loading">Laster...</div></div>
</div>
</section>

<section class="section" id="stats">
<div class="card"><h2>📻 Radio (Nielsen)</h2><div id="radio-stats">Laster...</div></div>
<div class="card"><h2>🎙️ Podcast (Podtoppen)</h2><div id="podcast-stats">Laster...</div></div>
</section>
</main>
</div>

<script>
const P='kloakontroll2026',U='https://kvniauxokdtmpvjtfnej.supabase.co',K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bmlhdXhva2R0bXB2anRmbmVqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1MTM2NzIzNCwiZXhwIjoyMDY2OTQzMjM0fQ.OkhTtq9QAQ3xMzZYKyWyCjj7PiqMZJKSvpA0jcBJqpE',T='a0000000-0000-0000-0000-000000000001';
function doLogin(){const i=document.getElementById('password-input').value;if(i===P){localStorage.setItem('mc_auth','true');showApp()}else{document.getElementById('login-error').style.display='block'}}
function doLogout(){localStorage.removeItem('mc_auth');location.reload()}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';const t=new Date();t.setDate(t.getDate()+1);document.getElementById('saksliste-date').value=t.toISOString().split('T')[0];initApp()}
function showSection(s){document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.nav button').forEach(e=>e.classList.remove('active'));document.getElementById(s).classList.add('active');document.querySelector('[data-section="'+s+'"]').classList.add('active');if(s==='saksliste')loadSaker();if(s==='stats')loadStats()}
async function sup(e,o={}){const u=U+'/rest/v1'+e,h={apikey:K,Authorization:'Bearer '+K,'Content-Type':'application/json',...o.headers},r=await fetch(u,{...o,headers:h});if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}
async function initApp(){await loadDashboard()}
async function loadDashboard(){try{const t=new Date();t.setDate(t.getDate()+1);const d=t.toISOString().split('T')[0],s=await sup('/agenda_items?tenant_id=eq.'+T+'&show_date=eq.'+d);document.getElementById('dash-saker').textContent=s.length;const n=await sup('/nielsen_weekly_metrics?channel=eq.NRJ&order=created_at.desc&limit=1');document.getElementById('dash-radio').textContent=n[0]?(n[0].value/1000).toFixed(1)+'k':'-';const p=await sup('/podtoppen_weekly_data?podcast_title=eq.NRJ%20Morgen%20Podkast&order=created_at.desc&limit=1');document.getElementById('dash-podcast').textContent=p[0]?'#'+p[0].rank:'-';document.getElementById('dash-status').innerHTML='<div class="alert ok">✅ Tilkoblet! '+s.length+' saker for '+d+'</div>'}catch(e){document.getElementById('dash-status').innerHTML='<div class="alert err">❌ '+e.message+'</div>'}}
async function loadSaker(){const c=document.getElementById('saksliste-content'),d=document.getElementById('saksliste-date').value;c.innerHTML='<div class="loading">Laster...</div>';try{const s=await sup('/agenda_items?tenant_id=eq.'+T+'&show_date=eq.'+d+'&order=order_index.asc');if(s.length===0){c.innerHTML='<p style="text-align:center;color:var(--muted)">Ingen saker for '+d+'</p>';return}c.innerHTML=s.map((a,i)=>'<div style="display:flex;gap:1rem;padding:1rem;background:var(--bg2);border-radius:0.5rem;margin-bottom:0.75rem;"><div style="width:32px;height:32px;background:var(--c1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;">'+(i+1)+'</div><div style="flex:1"><div style="font-weight:600;">'+a.title+'</div><div style="font-size:0.875rem;color:var(--muted)">'+(a.category||'TALK')+'</div></div></div>').join('')}catch(e){c.innerHTML='<div class="alert err">❌ '+e.message+'</div>'}}
async function loadStats(){try{const r=await sup('/nielsen_weekly_metrics?channel=eq.NRJ&order=created_at.desc&limit=5');document.getElementById('radio-stats').innerHTML=r.length>0?r.map(x=>'<div style="padding:1rem;background:var(--bg2);border-radius:0.5rem;margin-bottom:0.5rem;"><strong>Uke '+x.week_number+', '+x.year+'</strong>: '+x.value.toLocaleString()+' lyttere</div>').join(''):'<p style="color:var(--muted)">Ingen data</p>';const p=await sup('/podtoppen_weekly_data?podcast_title=eq.NRJ%20Morgen%20Podkast&order=created_at.desc&limit=5');document.getElementById('podcast-stats').innerHTML=p.length>0?p.map(x=>'<div style="padding:1rem;background:var(--bg2);border-radius:0.5rem;margin-bottom:0.5rem;"><strong>Uke '+x.week_number+'</strong>: Rank #'+x.rank+' • '+(x.unique_units||0).toLocaleString()+' unike</div>').join(''):'<p style="color:var(--muted)">Ingen data</p>'}catch(e){document.getElementById('radio-stats').innerHTML='<div class="alert err">❌ '+e.message+'</div>'}}
if(localStorage.getItem('mc_auth')==='true')showApp();
setInterval(()=>{if(document.getElementById('app').style.display==='block')loadDashboard()},300000);
</script>
</body>
</html>
