<!DOCTYPE html>
<html lang="no" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mission Control - NRJ Morgen Dashboard">
    <title>Mission Control | NRJ Morgen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-primary: #6366f1;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .login-box p { color: var(--text-muted); margin-bottom: 1.5rem; }
        .login-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
        }
        .login-box button:hover { opacity: 0.9; }
        .app { display: none; }
        .app.authenticated { display: block; }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .nav button {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav button:hover, .nav button.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section { display: none; }
        .section.active { display: block; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .sak-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .sak-item:hover {
            border-color: var(--color-primary);
        }
        .sak-number {
            width: 32px;
            height: 32px;
            background: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        .sak-content {
            flex: 1;
            min-width: 0;
        }
        .sak-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        .sak-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            align-items: center;
        }
        .sak-category {
            padding: 0.25rem 0.75rem;
            background: var(--color-primary);
            border-radius: 0.25rem;
            font-size: 0.75rem;
            color: white;
            font-weight: 500;
        }
        .sak-category.reality { background: #f59e0b; }
        .sak-category.kjendis { background: #ec4899; }
        .sak-category.film { background: #3b82f6; }
        .sak-category.musikk { background: #10b981; }
        .sak-category.internasjonalt { background: #8b5cf6; }
        .sak-link {
            color: var(--color-primary);
            text-decoration: none;
        }
        .sak-link:hover { text-decoration: underline; }
        .sak-notes {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn {
            padding: 0.5rem 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .btn:hover { opacity: 0.9; }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--color-success);
            color: var(--color-success);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .debug-info {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 1rem;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <div class="brand-icon" style="margin: 0 auto 1rem;">🎛️</div>
            <h1>Mission Control</h1>
            <p>NRJ Morgen Dashboard</p>
            <input type="password" id="password-input" placeholder="Passord" onkeypress="if(event.key==='Enter')login()">
            <button onclick="login()">Logg inn</button>
            <p id="login-error" style="color: var(--color-danger); margin-top: 1rem; display: none;">Feil passord</p>
        </div>
    </div>

    <!-- Main App -->
    <div class="app" id="app">
        <header class="header">
            <div class="brand">
                <div class="brand-icon">🎛️</div>
                <div>
                    <div style="font-weight: 700;">Mission Control</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">NRJ Morgen</div>
                </div>
            </div>
            <nav class="nav">
                <button class="active" onclick="showSection('dashboard')" data-section="dashboard">Dashboard</button>
                <button onclick="showSection('saksliste')" data-section="saksliste">Saksliste</button>
                <button onclick="showSection('podcast')" data-section="podcast">Podcast</button>
                <button onclick="logout()">Logg ut</button>
            </nav>
        </header>

        <main class="container">
            <!-- Dashboard Section -->
            <section class="section active" id="dashboard">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-saker">-</div>
                        <div class="stat-label">Saker i dag</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-radio">-</div>
                        <div class="stat-label">Radio lyttere</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-podcast">-</div>
                        <div class="stat-label">Podcast ranking</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📊 System Status</h2>
                    <div id="system-status">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Kobler til Supabase...</p>
                        </div>
                    </div>
                    <div class="debug-info" id="debug-info" style="display: none;"></div>
                </div>

                <div class="card">
                    <h2>🔄 Hurtighandlinger</h2>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <button class="btn" onclick="refreshAll()">🔄 Oppdater alle data</button>
                        <button class="btn" onclick="testConnection()">🔌 Test tilkobling</button>
                    </div>
                </div>
            </section>

            <!-- Saksliste Section -->
            <section class="section" id="saksliste">
                <div class="card">
                    <h2 style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                        <span>📋 Saksliste</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn" onclick="loadSaker()">🔄 Oppdater</button>
                        </div>
                    </h2>
                    <div id="saksliste-content">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Laster saker...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Podcast Section -->
            <section class="section" id="podcast">
                <div class="card">
                    <h2>🎧 Podcast Episoder</h2>
                    <div id="podcast-content">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Laster episoder...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Konfigurasjon
        const SUPABASE_URL = 'https://kvniauxokdtmpvjtfnej.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bmlhdXhva2R0bXB2anRmbmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEzNjcyMzQsImV4cCI6MjA2Njk0MzIzNH0._24RuF95RnxxHj3sjGswdd36VVYlX_jKxut8dvELfSA';
        const TENANT_ID = 'a0000000-0000-0000-0000-000000000001';
        const PASSWORD = 'kloakontroll2026';

        // Debug logging
        function log(message, type = 'info') {
            console.log(`[${type.toUpperCase()}] ${message}`);
            const debugEl = document.getElementById('debug-info');
            if (debugEl) {
                debugEl.style.display = 'block';
                debugEl.innerHTML += `<div style="color: ${type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#94a3b8'};">${new Date().toLocaleTimeString()}: ${message}</div>`;
            }
        }

        // Sjekk om allerede logget inn
        if (localStorage.getItem('mc_authenticated') === 'true') {
            showApp();
        }

        function login() {
            const input = document.getElementById('password-input').value;
            if (input === PASSWORD) {
                localStorage.setItem('mc_authenticated', 'true');
                showApp();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('mc_authenticated');
            location.reload();
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').classList.add('authenticated');
            log('App vist, starter init...');
            initApp();
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');
            
            if (sectionId === 'saksliste') loadSaker();
            if (sectionId === 'podcast') loadPodcast();
        }

        // Supabase Client med bedre feilhåndtering
        async function supabaseRequest(endpoint, options = {}) {
            const url = `${SUPABASE_URL}/rest/v1${endpoint}`;
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            log(`Request: ${url}`);
            
            try {
                const response = await fetch(url, { ...options, headers });
                log(`Response status: ${response.status}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                log(`Response data: ${JSON.stringify(data).substring(0, 200)}...`);
                return data;
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                throw error;
            }
        }

        async function initApp() {
            log('Starter initApp...');
            await loadDashboard();
        }

        async function loadDashboard() {
            log('Laster dashboard...');
            const statusEl = document.getElementById('system-status');
            
            try {
                // Hent dagens saker
                const today = new Date().toISOString().split('T')[0];
                log(`Henter saker for dato: ${today}`);
                
                const saker = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${today}`);
                log(`Fant ${saker.length} saker`, 'success');
                document.getElementById('stat-saker').textContent = saker.length;

                // Hent stats
                log('Henter radio stats...');
                const stats = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&category=eq.STATS&order=created_at.desc&limit=1`);
                
                log('Henter podcast stats...');
                const podcast = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&category=eq.PODCAST_RANKING&order=created_at.desc&limit=1`);
                
                if (stats[0] && stats[0].link_metadata) {
                    try {
                        const meta = typeof stats[0].link_metadata === 'string' 
                            ? JSON.parse(stats[0].link_metadata) 
                            : stats[0].link_metadata;
                        const listeners = meta.dailyListeners || meta.daily_listeners || 0;
                        document.getElementById('stat-radio').textContent = listeners ? (listeners / 1000).toFixed(1) + 'k' : '-';
                        log(`Radio lyttere: ${listeners}`, 'success');
                    } catch (e) {
                        log(`Kunne ikke parse radio stats: ${e.message}`, 'error');
                        document.getElementById('stat-radio').textContent = '-';
                    }
                } else {
                    log('Ingen radio stats funnet', 'warning');
                    document.getElementById('stat-radio').textContent = '-';
                }
                
                if (podcast[0] && podcast[0].link_metadata) {
                    try {
                        const meta = typeof podcast[0].link_metadata === 'string'
                            ? JSON.parse(podcast[0].link_metadata)
                            : podcast[0].link_metadata;
                        const ranking = meta.ranking || meta.podcast_ranking || 0;
                        document.getElementById('stat-podcast').textContent = ranking ? '#' + ranking : '-';
                        log(`Podcast ranking: ${ranking}`, 'success');
                    } catch (e) {
                        log(`Kunne ikke parse podcast stats: ${e.message}`, 'error');
                        document.getElementById('stat-podcast').textContent = '-';
                    }
                } else {
                    log('Ingen podcast stats funnet', 'warning');
                    document.getElementById('stat-podcast').textContent = '-';
                }

                statusEl.innerHTML = `
                    <div class="success">
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                            <span>✅ Supabase tilkoblet</span>
                            <span>✅ ${saker.length} saker i dag</span>
                            <span>✅ Dashboard aktivt</span>
                        </div>
                    </div>
                `;
                log('Dashboard lastet', 'success');
            } catch (error) {
                log(`Dashboard feil: ${error.message}`, 'error');
                statusEl.innerHTML = `
                    <div class="error">
                        <strong>❌ Feil ved lasting av data:</strong><br>
                        ${error.message}<br><br>
                        <button class="btn" onclick="loadDashboard()">Prøv igjen</button>
                    </div>
                `;
            }
        }

        async function loadSaker() {
            const container = document.getElementById('saksliste-content');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Laster saker...</p></div>';
            
            try {
                const today = new Date().toISOString().split('T')[0];
                log(`Laster saker for ${today}...`);
                
                const saker = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${today}&order=order_index.asc`);
                log(`Fant ${saker.length} saker`, 'success');
                
                if (saker.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                            <p style="font-size: 1.25rem; margin-bottom: 0.5rem;">Ingen saker for i dag</p>
                            <p>Kjør Morning Routine for å legge til saker.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = saker.map((sak, i) => {
                    const categoryClass = getCategoryClass(sak.category);
                    let notes = '';
                    if (sak.notes) {
                        // Fjern kilde-linjen fra visning
                        notes = sak.notes.split('\n\n')[0];
                        if (notes.length > 150) notes = notes.substring(0, 150) + '...';
                    }
                    
                    return `
                        <div class="sak-item">
                            <div class="sak-number">${i + 1}</div>
                            <div class="sak-content">
                                <div class="sak-title">${escapeHtml(sak.title)}</div>
                                <div class="sak-meta">
                                    <span class="sak-category ${categoryClass}">${sak.category || 'TALK'}</span>
                                    ${sak.link_url ? `<a href="${escapeHtml(sak.link_url)}" target="_blank" class="sak-link">🔗 Les mer</a>` : ''}
                                </div>
                                ${notes ? `<div class="sak-notes">${escapeHtml(notes)}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
                log('Saksliste rendret', 'success');
            } catch (error) {
                log(`Saksliste feil: ${error.message}`, 'error');
                container.innerHTML = `
                    <div class="error">
                        <strong>❌ Kunne ikke laste saker:</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        function getCategoryClass(category) {
            const map = {
                'REALITY_TV': 'reality',
                'KJENDIS_DRAMA': 'kjendis',
                'FILM_TV': 'film',
                'MUSIKK': 'musikk',
                'INTERNASJONALT': 'internasjonalt'
            };
            return map[category] || '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadPodcast() {
            const container = document.getElementById('podcast-content');
            
            try {
                log('Laster podcast episoder...');
                const episodes = await supabaseRequest('/podcast_episodes?order=published_at.desc&limit=10');
                log(`Fant ${episodes.length} episoder`, 'success');
                
                if (episodes.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                            <p>Ingen episoder funnet i databasen.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = episodes.map(ep => `
                    <div class="sak-item">
                        <div class="sak-content">
                            <div class="sak-title">${escapeHtml(ep.title)}</div>
                            <div class="sak-meta">
                                ${ep.published_at ? new Date(ep.published_at).toLocaleDateString('nb-NO') : ''}
                                ${ep.duration ? `• ${ep.duration}` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                log(`Podcast feil: ${error.message}`, 'error');
                container.innerHTML = `
                    <div class="error">
                        <strong>❌ Kunne ikke laste episoder:</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        async function testConnection() {
            log('Tester tilkobling...');
            try {
                const result = await supabaseRequest('/agenda_items?tenant_id=eq.' + TENANT_ID + '&limit=1');
                alert(`✅ Tilkobling OK! Fant ${result.length} test-rad.`);
                log('Tilkobling OK', 'success');
            } catch (error) {
                alert(`❌ Tilkobling feilet: ${error.message}`);
                log(`Tilkobling feilet: ${error.message}`, 'error');
            }
        }

        function refreshAll() {
            log('Oppdaterer alle data...');
            loadDashboard();
            if (document.getElementById('saksliste').classList.contains('active')) {
                loadSaker();
            }
            if (document.getElementById('podcast').classList.contains('active')) {
                loadPodcast();
            }
        }

        // Auto-refresh hvert 5. minutt
        setInterval(() => {
            if (document.getElementById('app').classList.contains('authenticated')) {
                log('Auto-refresh...');
                loadDashboard();
            }
        }, 300000);
    </script>
</body>
</html>
