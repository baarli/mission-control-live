<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | NRJ Morgen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }
        /* Login */
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 { margin-bottom: 0.5rem; }
        .login-box p { color: #94a3b8; margin-bottom: 1.5rem; }
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #0f172a;
            color: white;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #4f46e5; }
        .error { color: #ef4444; margin-top: 1rem; display: none; }
        /* App */
        .app { display: none; }
        .header {
            background: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .nav button {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            margin-left: 0.5rem;
        }
        .nav button.active {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .section { display: none; }
        .section.active { display: block; }
        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #334155;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .stat-box {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-num { font-size: 2rem; font-weight: bold; color: #6366f1; }
        .stat-label { color: #94a3b8; font-size: 0.875rem; }
        .sak-item {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            border: 1px solid #334155;
            display: flex;
            gap: 1rem;
        }
        .sak-num {
            width: 28px;
            height: 28px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .sak-title { font-weight: 600; margin-bottom: 0.25rem; }
        .sak-meta { color: #94a3b8; font-size: 0.875rem; }
        .tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: #6366f1;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }
        .loading { text-align: center; padding: 2rem; color: #94a3b8; }
        .success { color: #10b981; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <h1>🎛️ Mission Control</h1>
            <p>NRJ Morgen Dashboard</p>
            <input type="password" id="pwd" placeholder="Passord" onkeypress="if(event.key==='Enter')login()">
            <button onclick="login()">Logg inn</button>
            <div class="error" id="login-error">Feil passord</div>
        </div>
    </div>

    <!-- Main App -->
    <div class="app" id="app">
        <header class="header">
            <div>
                <strong>🎛️ Mission Control</strong>
                <span style="color: #94a3b8; margin-left: 1rem;">NRJ Morgen</span>
            </div>
            <nav class="nav">
                <button class="active" onclick="showTab('dashboard')" id="btn-dashboard">Dashboard</button>
                <button onclick="showTab('saker')" id="btn-saker">Saksliste</button>
                <button onclick="logout()">Logg ut</button>
            </nav>
        </header>

        <div class="container">
            <!-- Dashboard -->
            <div class="section active" id="dashboard">
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-num" id="stat-count">-</div>
                        <div class="stat-label">Saker</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num" id="stat-date">-</div>
                        <div class="stat-label">Dato</div>
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">📊 Status</h3>
                    <div id="status-msg">Laster...</div>
                </div>
            </div>

            <!-- Saksliste -->
            <div class="section" id="saker">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3>📋 Saksliste</h3>
                        <button onclick="loadSaker()">🔄 Oppdater</button>
                    </div>
                    <div id="saker-list">Laster...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Config
        const PASSWORD = 'kloakontroll2026';
        const SUPABASE_URL = 'https://kvniauxokdtmpvjtfnej.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bmlhdXhva2R0bXB2anRmbmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEzNjcyMzQsImV4cCI6MjA2Njk0MzIzNH0._24RuF95RnxxHj3sjGswdd36VVYlX_jKxut8dvELfSA';
        const TENANT_ID = 'a0000000-0000-0000-0000-000000000001';

        // Login
        function login() {
            const val = document.getElementById('pwd').value;
            if (val === PASSWORD) {
                localStorage.setItem('mc_auth', 'true');
                showApp();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('mc_auth');
            location.reload();
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadData();
        }

        function showTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            if (tab === 'saker') loadSaker();
        }

        // Supabase
        async function db(query) {
            const res = await fetch(SUPABASE_URL + '/rest/v1' + query, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
            });
            return res.json();
        }

        async function loadData() {
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            
            const sToday = await db(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${today}`);
            const sTomorrow = await db(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${tomorrow}`);
            
            const saker = sToday.length > 0 ? sToday : sTomorrow;
            const date = sToday.length > 0 ? today : tomorrow;
            
            document.getElementById('stat-count').textContent = saker.length;
            document.getElementById('stat-date').textContent = date.slice(5);
            document.getElementById('status-msg').innerHTML = `<span class="success">✅ ${saker.length} saker for ${date}</span>`;
            
            window.currentDate = date;
            window.sakerData = saker;
        }

        async function loadSaker() {
            const list = document.getElementById('saker-list');
            if (!window.sakerData) {
                await loadData();
            }
            
            if (window.sakerData.length === 0) {
                list.innerHTML = '<p>Ingen saker funnet.</p>';
                return;
            }
            
            list.innerHTML = window.sakerData.map((s, i) => `
                <div class="sak-item">
                    <div class="sak-num">${i + 1}</div>
                    <div>
                        <div class="sak-title">${escapeHtml(s.title)}</div>
                        <div class="sak-meta">
                            <span class="tag">${s.category || 'TALK'}</span>
                            ${s.link_url ? `<a href="${escapeHtml(s.link_url)}" target="_blank" style="color: #6366f1;">🔗 Les mer</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Auto-login
        if (localStorage.getItem('mc_auth') === 'true') {
            showApp();
        }
    </script>
</body>
</html>
