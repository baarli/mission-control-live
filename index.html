<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | NRJ Morgen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #6366f1;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .login-box p { color: var(--text-muted); margin-bottom: 1.5rem; }
        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .error { color: var(--color-danger); margin-top: 1rem; }
        .app { display: none; }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .brand { display: flex; align-items: center; gap: 0.75rem; }
        .nav { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .nav button {
            width: auto;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
        }
        .nav button.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .section { display: none; }
        .section.active { display: block; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--color-primary); }
        .stat-label { color: var(--text-muted); font-size: 0.875rem; }
        .sak-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
        }
        .sak-number {
            width: 32px;
            height: 32px;
            background: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        .sak-content { flex: 1; }
        .sak-title { font-weight: 600; margin-bottom: 0.25rem; }
        .sak-meta { display: flex; gap: 0.75rem; font-size: 0.875rem; color: var(--text-muted); flex-wrap: wrap; }
        .sak-category { padding: 0.25rem 0.75rem; background: var(--color-primary); border-radius: 0.25rem; font-size: 0.75rem; color: white; }
        .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { width: auto; padding: 0.5rem 1rem; }
        .success { color: var(--color-success); }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <div class="brand-icon">🎛️</div>
            <h1>Mission Control</h1>
            <p>NRJ Morgen Dashboard</p>
            <input type="password" id="password-input" placeholder="Passord" onkeypress="if(event.key==='Enter')doLogin()">
            <button onclick="doLogin()">Logg inn</button>
            <p class="error" id="login-error" style="display: none;">Feil passord</p>
        </div>
    </div>

    <!-- App -->
    <div class="app" id="app">
        <header class="header">
            <div class="brand">
                <div class="brand-icon" style="width: 40px; height: 40px; font-size: 1.25rem; margin: 0;">🎛️</div>
                <div>
                    <div style="font-weight: 700;">Mission Control</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">NRJ Morgen</div>
                </div>
            </div>
            <nav class="nav">
                <button class="active" onclick="showSection('dashboard')" data-section="dashboard">Dashboard</button>
                <button onclick="showSection('saksliste')" data-section="saksliste">Saksliste</button>
                <button onclick="doLogout()">Logg ut</button>
            </nav>
        </header>

        <main class="container">
            <section class="section active" id="dashboard">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-saker">-</div>
                        <div class="stat-label">Saker</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-radio">-</div>
                        <div class="stat-label">Radio lyttere</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-podcast">-</div>
                        <div class="stat-label">Podcast ranking</div>
                    </div>
                </div>
                <div class="card">
                    <h2>📊 Status</h2>
                    <div id="status-content">Laster...</div>
                </div>
            </section>

            <section class="section" id="saksliste">
                <div class="card">
                    <h2 style="display: flex; justify-content: space-between; align-items: center;">
                        <span>📋 Saksliste</span>
                        <button class="btn" onclick="loadSaker()">🔄 Oppdater</button>
                    </h2>
                    <div id="saksliste-content">
                        <div class="loading"><div class="spinner"></div><p>Laster saker...</p></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const PASSWORD = 'kloakontroll2026';
        const SUPABASE_URL = 'https://kvniauxokdtmpvjtfnej.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bmlhdXhva2R0bXB2anRmbmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEzNjcyMzQsImV4cCI6MjA2Njk0MzIzNH0._24RuF95RnxxHj3sjGswdd36VVYlX_jKxut8dvELfSA';
        const TENANT_ID = 'a0000000-0000-0000-0000-000000000001';

        function doLogin() {
            const input = document.getElementById('password-input').value;
            if (input === PASSWORD) {
                localStorage.setItem('mc_auth', 'true');
                showApp();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function doLogout() {
            localStorage.removeItem('mc_auth');
            location.reload();
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            initApp();
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            document.querySelector(`[data-section="${section}"]`).classList.add('active');
            if (section === 'saksliste') loadSaker();
        }

        async function supabaseRequest(endpoint) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1${endpoint}`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            return response.json();
        }

        async function initApp() {
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            
            // Sjekk begge datoer
            const sakerToday = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${today}`);
            const sakerTomorrow = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${tomorrow}`);
            
            const saker = sakerToday.length > 0 ? sakerToday : sakerTomorrow;
            const date = sakerToday.length > 0 ? today : tomorrow;
            
            document.getElementById('stat-saker').textContent = saker.length;
            document.getElementById('status-content').innerHTML = `
                <p class="success">✅ Tilkoblet! ${saker.length} saker for ${date}</p>
            `;
            
            window.currentDate = date;
        }

        async function loadSaker() {
            const container = document.getElementById('saksliste-content');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Laster...</p></div>';
            
            const date = window.currentDate || new Date().toISOString().split('T')[0];
            const saker = await supabaseRequest(`/agenda_items?tenant_id=eq.${TENANT_ID}&show_date=eq.${date}&order=order_index.asc`);
            
            if (saker.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Ingen saker.</p>';
                return;
            }
            
            container.innerHTML = saker.map((sak, i) => `
                <div class="sak-item">
                    <div class="sak-number">${i + 1}</div>
                    <div class="sak-content">
                        <div class="sak-title">${sak.title}</div>
                        <div class="sak-meta">
                            <span class="sak-category">${sak.category || 'TALK'}</span>
                            ${sak.link_url ? `<a href="${sak.link_url}" target="_blank" style="color: var(--color-primary);">🔗 Les mer</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Auto-login
        if (localStorage.getItem('mc_auth') === 'true') {
            showApp();
        }
    </script>
</body>
</html>
