# ==========================================
# Mission Control | NRJ Morgen
# Docker Compose Configuration
# ==========================================

version: '3.8'

services:
  # ------------------------------------------
  # Development Service
  # ------------------------------------------
  app-dev:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: mission-control-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_BRAVE_API_KEY=${VITE_BRAVE_API_KEY}
      - VITE_APP_ENVIRONMENT=development
      - VITE_ENABLE_DEBUG_LOGGING=true
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    networks:
      - mission-control-network

  # ------------------------------------------
  # Production Service
  # ------------------------------------------
  app-prod:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_BRAVE_API_KEY: ${VITE_BRAVE_API_KEY}
        VITE_APP_ENVIRONMENT: production
    container_name: mission-control-prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - mission-control-network

  # ------------------------------------------
  # Nginx Reverse Proxy (optional)
  # ------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: mission-control-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app-prod
    restart: unless-stopped
    networks:
      - mission-control-network
    profiles:
      - proxy

  # ------------------------------------------
  # Watchtower (auto-update containers)
  # ------------------------------------------
  watchtower:
    image: containrrr/watchtower
    container_name: mission-control-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=false
    restart: unless-stopped
    networks:
      - mission-control-network
    profiles:
      - monitoring

networks:
  mission-control-network:
    driver: bridge
